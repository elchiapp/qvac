name: Release Notes Check (OCR)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - release-*
    paths:
      - "packages/ocr-onnx/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  release-notes-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Read PR package version
        id: package-version
        shell: bash
        run: |
          set -euo pipefail
          version=$(jq -r '.version' packages/ocr-onnx/package.json)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Checkout base repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Detect version bump
        id: version
        uses: ./.github/actions/detect-version-bump
        with:
          current_version: ${{ steps.package-version.outputs.version }}
          prev_sha: ${{ github.event.pull_request.base.sha }}
          workdir: packages/ocr-onnx

      - name: Validate Release Notes on version bump
        if: steps.version.outputs.bumped == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          script: |
            const pullNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const version = "${{ steps.package-version.outputs.version }}";
            const expected = `packages/ocr-onnx/release-notes/v${version}.md`;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pullNumber, per_page: 100 }
            );

            const hasNotes = files.some(file => file.filename === expected);
            if (!hasNotes) {
              core.setFailed(`Missing release notes file in PR changes: ${expected}`);
            } else {
              core.info(`Release notes file found in PR changes: ${expected}`);
            }
